kind = "web"
previewPath = "/"
title = "Meteoritos"
version = "1.0.0"
id = "artifacts/meteoritos"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24212

[services.development]
run = "pnpm --filter @workspace/meteoritos run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/meteoritos", "run", "build" ]
publicDir = "artifacts/meteoritos/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24212"
BASE_PATH = "/"
